<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - MA Fashions</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
        }

        .container {
            width: 80%;
            margin: auto;
            text-align: center;
            padding: 50px 0;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        form {
            max-width: 500px;
            margin: auto;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        button {
            padding: 12px 30px;
            background-color: #fff;
            color: #111;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #ccc;
        }

        .home-link {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            color: #fff;
            border-bottom: 1px solid #fff;
            transition: 0.3s;
        }

        .home-link:hover {
            color: #ccc;
            border-color: #ccc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contact MA Fashions</h1>

        <p>Have questions or want to work with us? Send us a message below.</p>

        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
        <a href="index.html" class="home-link">Back to Home</a>
    </div>

</body>
</html>
